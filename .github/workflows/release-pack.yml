name: Release NoxTLS Pack

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-pack:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          submodules: recursive

      - name: Sync NoxTLS into pack staging
        run: ./scripts/sync-noxtls.sh

      - name: Build .pack archive
        run: ./scripts/build-pack.sh

      - name: Validate tag matches PDSC version
        env:
          TAG_NAME: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          tag_version="${TAG_NAME#v}"
          pdsc_version="$(python3 - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse("NoxTLS/Files/Argenox.NoxTLS.pdsc").getroot()
          rel = root.findall("./releases/release")
          if not rel:
              raise SystemExit("No <release> entries found in PDSC.")
          version = (rel[0].get("version") or "").strip()
          if not version:
              raise SystemExit("Latest <release> is missing version attribute.")
          print(version)
          PY
          )"
          if [[ "$tag_version" != "$pdsc_version" ]]; then
            echo "Tag version ($tag_version) does not match PDSC version ($pdsc_version)." >&2
            exit 1
          fi

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            artifacts/pack/*.pack
